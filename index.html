    function renderMenuItems(config) {
      const container = document.getElementById('menu-items');
      const textColor = config.text_color || defaultConfig.text_color;
      const secondaryColor = config.secondary_text_color || defaultConfig.secondary_text_color;
      const accentColor = config.accent_color || defaultConfig.accent_color;
      const fontFamily = config.font_family || defaultConfig.font_family;
      const fontSize = config.font_size || defaultConfig.font_size;

      let html = '';
      
      // Add navigation buttons at the very start
      html += `
        <div class="flex justify-center gap-6 mb-12">
          <a href="https://zerotofamebr.github.io/adegainv-/" target="_blank" rel="noopener noreferrer" class="px-6 py-2 font-body text-sm font-light tracking-wide transition-all duration-300 border border-gray-300 hover:border-gray-500 hover:text-gray-700" style="color: #666666;"> Vinhos </a> 
          <a href="https://zerotofamebr.github.io/bebidasinv-/" target="_blank" rel="noopener noreferrer" class="px-6 py-2 font-body text-sm font-light tracking-wide transition-all duration-300 border border-gray-300 hover:border-gray-500 hover:text-gray-700" style="color: #666666;"> Bebidas </a>
        </div>
      `;
      
      html += menuData.map((item, index) => {
        // Check if this is the ENTRADAS section
        if (item.isSection && item.name === "ENTRADAS") {
          // Render the section title without the buttons
          let sectionHtml = `
            <div class="section-title mt-16 mb-8 pt-8 border-t border-gray-300">
              <h2 class="font-display font-normal tracking-widest text-3xl md:text-4xl" 
                  style="color: ${textColor}; font-family: '${fontFamily}', serif; font-size: ${fontSize * 2.5}px;">
                ${item.name}
              </h2>
            </div>
          `;
          
          return sectionHtml;
        }
        
        // Render other sections normally
        if (item.isSection) {
          return `
            <div class="section-title mt-16 mb-8 pt-8 border-t border-gray-300">
              <h2 class="font-display font-normal tracking-widest text-3xl md:text-4xl" 
                  style="color: ${textColor}; font-family: '${fontFamily}', serif; font-size: ${fontSize * 2.5}px;">
                ${item.name}
              </h2>
            </div>
          `;
        }
        
        // Render menu items
        return `
        <div class="menu-item flex gap-6 items-start pb-6 border-b border-gray-200" style="margin-bottom: 1.5rem;">
          <!-- Image -->
          <div class="flex-shrink-0">
            <div class="w-32 h-32 md:w-40 md:h-40 rounded-lg overflow-hidden relative" style="background: ${item.color}; opacity: 1;">
              ${item.image ? 
                `<img src="${item.image}?w=200&q=75" alt="${item.name}" class="w-full h-full object-cover" loading="lazy" decoding="async" srcset="${item.image}?w=160&q=75 160w, ${item.image}?w=200&q=75 200w" onerror="this.style.display='none'; this.parentElement.style.background='${item.color}';">` :
                ``
              }
            </div>
          </div>
          <!-- Content -->
          <div class="flex-1 pt-1">
            <h3 class="font-display font-normal tracking-wide mb-2 transition-colors duration-300" 
                style="color: ${textColor}; font-family: '${fontFamily}', serif; font-size: ${fontSize * 1.3}px;">
              ${item.name}
            </h3>
            <p class="font-body text-sm font-light leading-relaxed mb-3" 
               style="color: ${secondaryColor}; font-size: ${fontSize * 0.85}px; white-space: normal; word-wrap: break-word;">
              ${item.description.replace(/\n/g, '<br>')}
            </p>
            <!-- Price -->
            <div class="flex items-center gap-3">
              <span class="font-display font-light" 
                    style="color: ${accentColor}; font-family: '${fontFamily}', serif; font-size: ${fontSize * 1.2}px;">
                R$${item.price}
              </span>
            </div>
          </div>
        </div>
      `;
      }).join('');
      
      container.innerHTML = html;
    }

    async function onConfigChange(config) {
      const bgColor = config.background_color || defaultConfig.background_color;
      const textColor = config.text_color || defaultConfig.text_color;
      const accentColor = config.accent_color || defaultConfig.accent_color;
      const secondaryColor = config.secondary_text_color || defaultConfig.secondary_text_color;
      const fontFamily = config.font_family || defaultConfig.font_family;
      const fontSize = config.font_size || defaultConfig.font_size;

      // Background
      document.getElementById('menu-container').style.backgroundColor = bgColor;

      // Category title
      const titleEl = document.getElementById('category-title');
      titleEl.textContent = config.category_title || defaultConfig.category_title;
      titleEl.style.color = textColor;
      titleEl.style.fontFamily = `'${fontFamily}', serif`;
      titleEl.style.fontSize = `${fontSize * 3.5}px`;

      // Restaurant name
      const restaurantEl = document.getElementById('restaurant-name');
      restaurantEl.textContent = config.restaurant_name || defaultConfig.restaurant_name;
      restaurantEl.style.color = secondaryColor;
      restaurantEl.style.fontFamily = `'${fontFamily}', serif`;
      restaurantEl.style.fontSize = `${fontSize * 1.5}px`;

      // Divider
      document.getElementById('divider').style.color = accentColor;

      // Render menu items
      renderMenuItems(config);
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => {
              config.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {

            set: (value) => {
              config.secondary_text_color = value;
              window.elementSdk.setConfig({ secondary_text_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => {
            config.font_family = value;
            window.elementSdk.setConfig({ font_family: value });

          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => {
            config.font_size = value;
            window.elementSdk.setConfig({ font_size: value });
          }
        }
      };
    }

    function mapToEditPanelValues(config) {
